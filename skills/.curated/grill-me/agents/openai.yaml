interface:
  display_name: "Grill Me"
  short_description: "Stress-test a plan and, in docs mode, keep durable docs current"
  default_prompt: "Use $grill-me to interview me about this plan. Decide routine best-practice defaults yourself, log them for review, and ask me only material questions. If this should update durable docs (CONTEXT.md, ADRs, decisions.md), use docs mode."
