interface:
  display_name: "Cap"
  short_description: "Verify, commit, and push safely"
  default_prompt: "Use $cap to choose the smallest honest finish mode, verify the intended work, repair safe deterministic check failures, stage exact files only, create a Conventional Commit, and push safely. Use $cap fast for tiny bounded changes, $cap dry-run for no-mutation rehearsal, $cap verify for checks only, $cap watch for post-push deployment follow-through, and $cap release for the full verify/commit/push/deploy-recovery path."
